<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panchage Cinema</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/movies.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">🎀 PANCHAGE CINEMA 🎀</div>

    <input type="text" id="searchInput" placeholder="Search movies...">

</nav>

<!-- FEATURED -->
<section class="featured">

    <h2>⭐ Featured Movie</h2>

    <div class="featured-box" id="featuredBox">
        <p>Loading featured movie...</p>
    </div>

</section>

<!-- FAVORITES -->
<section class="section">
    <h2>❤️ Your Favorites</h2>
    <div class="row" id="favoritesRow"></div>
</section>

<!-- REQUESTED -->
<section class="section">
    <h2>🎁 Requested Movies</h2>
    <div class="row" id="requestedRow"></div>
</section>

<!-- TONIGHT -->
<section class="section">
    <h2>🎬 Movies For Tonight</h2>
    <div class="row" id="tonightRow"></div>
</section>

<!-- RECENT -->
<section class="section">
    <h2>🆕 Recently Added</h2>
    <div class="row" id="recentRow"></div>
</section>

<script src="js/movies.js"></script>

</body>

</html>
