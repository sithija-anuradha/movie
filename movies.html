<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Private Cinema</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/movies.css">

</head>

<body>

    <!-- Navigation -->

    <nav class="navbar">

        <div class="logo">

            🎀 PANCHAGE CINEMA 🎀

        </div>

        <div class="nav-right">

            <input
                type="text"
                id="searchInput"
                placeholder="Search movies...">

        </div>

    </nav>

    <!-- Hero -->

    <section class="hero">

        <div class="hero-content">

            <h1>Welcome Back</h1>

            <p>
                Discover your private movie collection.
            </p>

        </div>

    </section>

    <!-- Movies -->

    <section class="movies-section">

        <h2>All Movies</h2>

        <div
            class="movie-grid"
            id="movieGrid">

        </div>

    </section>

    <script src="js/movies.js"></script>

</body>

</html>
