
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Private Cinema</title>

    <link rel="stylesheet" href="movies.css">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>🎬 Admin Panel</h2>
    </div>

    <!-- ADD MOVIE FORM -->
    <div class="section">

        <h2>Add Movie</h2>

        <input id="title" type="text" placeholder="Movie Title">
        <input id="poster" type="text" placeholder="Poster URL">
        <input id="movie" type="text" placeholder="Movie URL">

        <select id="section">
            <option value="favorites">❤️ Favorites</option>
            <option value="requested">🎁 Requested</option>
            <option value="tonight">🎬 Tonight</option>
        </select>

        <button onclick="addMovie()">➕ Add Movie</button>

    </div>

    <!-- ADMIN MOVIE LIST -->
    <div class="section">

        <h2>📋 Movies List</h2>

        <div id="adminList"></div>

    </div>

    <script src="js/admin.js"></script>

</body>
</html>
